{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="{% block meta_description %}AI-Solution — Powering the future of digital workplaces with intelligent AI technologies.{% endblock %}" />

  <title>{% block title %}AI-Solution | Intelligent Workplace Automation{% endblock %}</title>

  <!-- Favicon -->
  <link rel="icon" type="image/svg+xml" href="{% static 'images/logo.svg' %}">

  <!-- Bootstrap 5 CSS -->
  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    rel="stylesheet"
  />

  <!-- Bootstrap Icons -->
  <link
    rel="stylesheet"
    href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
  />

  <!-- Custom CSS (loaded after Bootstrap so it can override) -->
  <link rel="stylesheet" href="{% static 'css/style.css' %}" />

  {% block extra_css %}{% endblock %}
</head>

<body>

  <!-- ═══════════════════════════════════════════════════════
       NAVBAR — included from partials/navbar.html
  ════════════════════════════════════════════════════════ -->
  {% include 'partials/navbar.html' %}

  <!-- ═══════════════════════════════════════════════════════
       MAIN CONTENT — each page fills this block
  ════════════════════════════════════════════════════════ -->
  <main>
    {% block content %}
    {% endblock %}
  </main>

  <!-- ═══════════════════════════════════════════════════════
       FOOTER — included from partials/footer.html
  ════════════════════════════════════════════════════════ -->
  {% include 'partials/footer.html' %}

  <!-- ═══════════════════════════════════════════════════════
       SCRIPTS
  ════════════════════════════════════════════════════════ -->
  <!-- Bootstrap 5 JS (includes Popper) -->
  <script
    src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js">
  </script>

  <!-- Custom JS -->
  <script src="{% static 'js/main.js' %}"></script>

  {% block extra_js %}{% endblock %}
</body>
</html>
