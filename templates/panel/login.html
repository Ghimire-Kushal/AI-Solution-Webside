{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Login | AI-Solutions</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <link rel="stylesheet" href="{% static 'css/style.css' %}">
</head>
<body style="min-height:100vh;display:flex;align-items:center;justify-content:center;background:var(--dark);">

<div style="width:100%;max-width:420px;padding:1.5rem;">

  <div class="text-center mb-4">
    <img src="{% static 'images/logo.svg' %}" alt="AI-Solutions" height="50" class="mb-3">
    <p style="font-size:.82rem;color:var(--text-muted);">Admin Panel — Authorised Access Only</p>
  </div>

  {% if messages %}
  {% for message in messages %}
  <div class="alert d-flex align-items-center gap-2 mb-3"
       style="background:rgba(239,68,68,0.1);border:1px solid rgba(239,68,68,0.25);border-radius:10px;color:#ef4444;">
    <i class="bi bi-exclamation-circle-fill"></i> {{ message }}
  </div>
  {% endfor %}
  {% endif %}

  <div style="background:var(--dark-card);border:1px solid var(--dark-border);border-radius:var(--radius-lg);padding:2.25rem;position:relative;overflow:hidden;">
    <div style="position:absolute;top:0;left:0;right:0;height:3px;background:var(--gradient-1);"></div>

    <h5 style="font-weight:700;color:#fff;margin-bottom:1.5rem;">Sign In</h5>

    <form method="post" novalidate>
      {% csrf_token %}
      <div class="mb-3">
        <label class="form-label">Username</label>
        <div class="input-group">
          <span class="input-group-text" style="background:rgba(255,255,255,0.03);border:1px solid rgba(46,134,222,0.15);border-right:none;color:var(--text-muted);">
            <i class="bi bi-person-fill"></i>
          </span>
          <input type="text" name="username" class="form-control" style="border-left:none;" placeholder="admin" required autofocus>
        </div>
      </div>

      <div class="mb-4">
        <label class="form-label">Password</label>
        <div class="input-group">
          <span class="input-group-text" style="background:rgba(255,255,255,0.03);border:1px solid rgba(46,134,222,0.15);border-right:none;color:var(--text-muted);">
            <i class="bi bi-lock-fill"></i>
          </span>
          <input type="password" name="password" id="pwField" class="form-control" style="border-left:none;border-right:none;" placeholder="••••••••" required>
          <span class="input-group-text" id="togglePw" style="background:rgba(255,255,255,0.03);border:1px solid rgba(46,134,222,0.15);border-left:none;cursor:pointer;color:var(--text-muted);">
            <i class="bi bi-eye" id="eyeIcon"></i>
          </span>
        </div>
      </div>

      <button type="submit" class="btn-primary-custom w-100 justify-content-center">
        <i class="bi bi-box-arrow-in-right"></i> Sign In
      </button>
    </form>

    <div class="text-center mt-3">
      <a href="{% url 'home' %}" style="font-size:.8rem;color:var(--text-muted);">
        <i class="bi bi-arrow-left"></i> Back to Website
      </a>
    </div>
  </div>

  <p class="text-center mt-3" style="font-size:.75rem;color:#334455;">
    Default: username <code style="color:var(--secondary);">admin</code> · password <code style="color:var(--secondary);">Admin@123</code>
  </p>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
  document.getElementById('togglePw').addEventListener('click', function() {
    const f = document.getElementById('pwField');
    const icon = document.getElementById('eyeIcon');
    if (f.type === 'password') { f.type = 'text'; icon.className = 'bi bi-eye-slash'; }
    else { f.type = 'password'; icon.className = 'bi bi-eye'; }
  });
</script>
</body>
</html>
