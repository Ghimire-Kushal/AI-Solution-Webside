<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a1628"/>
      <stop offset="100%" style="stop-color:#0d1a2e"/>
    </linearGradient>
    <linearGradient id="cyan" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#22d3ee"/>
      <stop offset="100%" style="stop-color:#67e8f9"/>
    </linearGradient>
    <linearGradient id="blue" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2E86DE"/>
      <stop offset="100%" style="stop-color:#89C2FF"/>
    </linearGradient>
    <filter id="glow"><feGaussianBlur stdDeviation="4" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>
  <rect width="800" height="500" fill="url(#bg)"/>
  <g opacity="0.07" stroke="#22d3ee" stroke-width="1">
    <line x1="0" y1="62" x2="800" y2="62"/><line x1="0" y1="125" x2="800" y2="125"/>
    <line x1="0" y1="187" x2="800" y2="187"/><line x1="0" y1="250" x2="800" y2="250"/>
    <line x1="0" y1="312" x2="800" y2="312"/><line x1="0" y1="375" x2="800" y2="375"/>
    <line x1="100" y1="0" x2="100" y2="500"/><line x1="200" y1="0" x2="200" y2="500"/>
    <line x1="300" y1="0" x2="300" y2="500"/><line x1="400" y1="0" x2="400" y2="500"/>
    <line x1="500" y1="0" x2="500" y2="500"/><line x1="600" y1="0" x2="600" y2="500"/>
    <line x1="700" y1="0" x2="700" y2="500"/>
  </g>
  <!-- Central AI brain -->
  <circle cx="400" cy="230" r="70" fill="rgba(34,211,238,0.08)" stroke="rgba(34,211,238,0.3)" stroke-width="1.5" filter="url(#glow)"/>
  <circle cx="400" cy="230" r="45" fill="rgba(34,211,238,0.12)" stroke="rgba(34,211,238,0.4)" stroke-width="1.5"/>
  <!-- Brain lines -->
  <path d="M370,210 Q380,195 400,200 Q420,195 430,210" fill="none" stroke="#22d3ee" stroke-width="1.5" opacity="0.7"/>
  <path d="M365,230 Q375,220 390,225 Q405,220 415,225 Q425,220 435,230" fill="none" stroke="#22d3ee" stroke-width="1.5" opacity="0.7"/>
  <path d="M370,250 Q380,265 400,260 Q420,265 430,250" fill="none" stroke="#22d3ee" stroke-width="1.5" opacity="0.7"/>
  <line x1="380" y1="200" x2="380" y2="260" stroke="#22d3ee" stroke-width="1" opacity="0.5"/>
  <line x1="400" y1="195" x2="400" y2="265" stroke="#22d3ee" stroke-width="1" opacity="0.5"/>
  <line x1="420" y1="200" x2="420" y2="260" stroke="#22d3ee" stroke-width="1" opacity="0.5"/>
  <!-- Satellite nodes -->
  <circle cx="160" cy="120" r="14" fill="rgba(46,134,222,0.2)" stroke="#2E86DE" stroke-width="2" filter="url(#glow)"/>
  <circle cx="640" cy="120" r="14" fill="rgba(46,134,222,0.2)" stroke="#2E86DE" stroke-width="2" filter="url(#glow)"/>
  <circle cx="120" cy="310" r="14" fill="rgba(34,211,238,0.2)" stroke="#22d3ee" stroke-width="2" filter="url(#glow)"/>
  <circle cx="680" cy="310" r="14" fill="rgba(34,211,238,0.2)" stroke="#22d3ee" stroke-width="2" filter="url(#glow)"/>
  <circle cx="400" cy="90" r="14" fill="rgba(46,134,222,0.2)" stroke="#2E86DE" stroke-width="2" filter="url(#glow)"/>
  <circle cx="400" cy="370" r="14" fill="rgba(34,211,238,0.2)" stroke="#22d3ee" stroke-width="2" filter="url(#glow)"/>
  <!-- Connection beams -->
  <line x1="174" y1="128" x2="335" y2="205" stroke="#2E86DE" stroke-width="1.2" opacity="0.4"/>
  <line x1="626" y1="128" x2="465" y2="205" stroke="#2E86DE" stroke-width="1.2" opacity="0.4"/>
  <line x1="132" y1="302" x2="340" y2="245" stroke="#22d3ee" stroke-width="1.2" opacity="0.4"/>
  <line x1="668" y1="302" x2="460" y2="245" stroke="#22d3ee" stroke-width="1.2" opacity="0.4"/>
  <line x1="400" y1="104" x2="400" y2="185" stroke="#2E86DE" stroke-width="1.2" opacity="0.4"/>
  <line x1="400" y1="356" x2="400" y2="275" stroke="#22d3ee" stroke-width="1.2" opacity="0.4"/>
  <!-- Gear icons at nodes -->
  <text x="160" y="125" font-family="Arial" font-size="12" fill="#89C2FF" text-anchor="middle">⚙</text>
  <text x="640" y="125" font-family="Arial" font-size="12" fill="#89C2FF" text-anchor="middle">⚙</text>
  <text x="120" y="315" font-family="Arial" font-size="12" fill="#67e8f9" text-anchor="middle">◈</text>
  <text x="680" y="315" font-family="Arial" font-size="12" fill="#67e8f9" text-anchor="middle">◈</text>
  <text x="400" y="95" font-family="Arial" font-size="12" fill="#89C2FF" text-anchor="middle">⬡</text>
  <text x="400" y="375" font-family="Arial" font-size="12" fill="#67e8f9" text-anchor="middle">◉</text>
  <text x="400" y="430" font-family="Arial,sans-serif" font-size="22" font-weight="700" fill="#fff" text-anchor="middle" opacity="0.9">Custom AI Solutions</text>
  <text x="400" y="458" font-family="Arial,sans-serif" font-size="13" fill="#67e8f9" text-anchor="middle" opacity="0.7">Tailored AI for Any Industry or Domain</text>
  <rect x="30" y="24" width="100" height="28" rx="14" fill="rgba(34,211,238,0.2)" stroke="rgba(34,211,238,0.4)" stroke-width="1"/>
  <text x="80" y="42" font-family="Arial,sans-serif" font-size="11" fill="#67e8f9" text-anchor="middle" font-weight="600">CUSTOM AI</text>
</svg>
