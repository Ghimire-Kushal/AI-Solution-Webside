<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a1628"/>
      <stop offset="100%" style="stop-color:#0d2010"/>
    </linearGradient>
    <linearGradient id="green" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#22c55e"/>
      <stop offset="100%" style="stop-color:#4ade80"/>
    </linearGradient>
    <linearGradient id="teal" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0ea5e9"/>
      <stop offset="100%" style="stop-color:#38bdf8"/>
    </linearGradient>
    <filter id="glow"><feGaussianBlur stdDeviation="4" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>
  <rect width="800" height="500" fill="url(#bg)"/>
  <g opacity="0.07" stroke="#22c55e" stroke-width="1">
    <line x1="0" y1="62" x2="800" y2="62"/><line x1="0" y1="125" x2="800" y2="125"/>
    <line x1="0" y1="187" x2="800" y2="187"/><line x1="0" y1="250" x2="800" y2="250"/>
    <line x1="0" y1="312" x2="800" y2="312"/><line x1="0" y1="375" x2="800" y2="375"/>
    <line x1="100" y1="0" x2="100" y2="500"/><line x1="200" y1="0" x2="200" y2="500"/>
    <line x1="300" y1="0" x2="300" y2="500"/><line x1="400" y1="0" x2="400" y2="500"/>
    <line x1="500" y1="0" x2="500" y2="500"/><line x1="600" y1="0" x2="600" y2="500"/>
    <line x1="700" y1="0" x2="700" y2="500"/>
  </g>
  <circle cx="400" cy="250" r="160" fill="rgba(34,197,94,0.05)"/>
  <!-- Neural network nodes for learning -->
  <!-- Input layer -->
  <circle cx="160" cy="150" r="18" fill="rgba(34,197,94,0.2)" stroke="#22c55e" stroke-width="2" filter="url(#glow)"/>
  <circle cx="160" cy="230" r="18" fill="rgba(34,197,94,0.2)" stroke="#22c55e" stroke-width="2" filter="url(#glow)"/>
  <circle cx="160" cy="310" r="18" fill="rgba(34,197,94,0.2)" stroke="#22c55e" stroke-width="2" filter="url(#glow)"/>
  <text x="160" y="155" font-family="Arial" font-size="11" fill="#4ade80" text-anchor="middle">A</text>
  <text x="160" y="235" font-family="Arial" font-size="11" fill="#4ade80" text-anchor="middle">B</text>
  <text x="160" y="315" font-family="Arial" font-size="11" fill="#4ade80" text-anchor="middle">C</text>
  <!-- Hidden layer 1 -->
  <circle cx="300" cy="120" r="15" fill="rgba(14,165,233,0.2)" stroke="#0ea5e9" stroke-width="2" filter="url(#glow)"/>
  <circle cx="300" cy="190" r="15" fill="rgba(14,165,233,0.2)" stroke="#0ea5e9" stroke-width="2" filter="url(#glow)"/>
  <circle cx="300" cy="260" r="15" fill="rgba(14,165,233,0.2)" stroke="#0ea5e9" stroke-width="2" filter="url(#glow)"/>
  <circle cx="300" cy="330" r="15" fill="rgba(14,165,233,0.2)" stroke="#0ea5e9" stroke-width="2" filter="url(#glow)"/>
  <!-- Hidden layer 2 -->
  <circle cx="430" cy="150" r="15" fill="rgba(14,165,233,0.2)" stroke="#0ea5e9" stroke-width="2" filter="url(#glow)"/>
  <circle cx="430" cy="230" r="15" fill="rgba(14,165,233,0.2)" stroke="#0ea5e9" stroke-width="2" filter="url(#glow)"/>
  <circle cx="430" cy="310" r="15" fill="rgba(14,165,233,0.2)" stroke="#0ea5e9" stroke-width="2" filter="url(#glow)"/>
  <!-- Output layer -->
  <circle cx="570" cy="180" r="20" fill="rgba(34,197,94,0.25)" stroke="#22c55e" stroke-width="2.5" filter="url(#glow)"/>
  <circle cx="570" cy="280" r="20" fill="rgba(34,197,94,0.25)" stroke="#22c55e" stroke-width="2.5" filter="url(#glow)"/>
  <!-- Connections layer 1-2 -->
  <g stroke="#22c55e" stroke-width="0.8" opacity="0.3">
    <line x1="178" y1="150" x2="285" y2="120"/><line x1="178" y1="150" x2="285" y2="190"/>
    <line x1="178" y1="150" x2="285" y2="260"/><line x1="178" y1="150" x2="285" y2="330"/>
    <line x1="178" y1="230" x2="285" y2="120"/><line x1="178" y1="230" x2="285" y2="190"/>
    <line x1="178" y1="230" x2="285" y2="260"/><line x1="178" y1="230" x2="285" y2="330"/>
    <line x1="178" y1="310" x2="285" y2="120"/><line x1="178" y1="310" x2="285" y2="190"/>
    <line x1="178" y1="310" x2="285" y2="260"/><line x1="178" y1="310" x2="285" y2="330"/>
  </g>
  <!-- Connections layer 2-3 -->
  <g stroke="#0ea5e9" stroke-width="0.8" opacity="0.3">
    <line x1="315" y1="120" x2="415" y2="150"/><line x1="315" y1="120" x2="415" y2="230"/>
    <line x1="315" y1="120" x2="415" y2="310"/>
    <line x1="315" y1="190" x2="415" y2="150"/><line x1="315" y1="190" x2="415" y2="230"/>
    <line x1="315" y1="190" x2="415" y2="310"/>
    <line x1="315" y1="260" x2="415" y2="150"/><line x1="315" y1="260" x2="415" y2="230"/>
    <line x1="315" y1="260" x2="415" y2="310"/>
    <line x1="315" y1="330" x2="415" y2="150"/><line x1="315" y1="330" x2="415" y2="230"/>
    <line x1="315" y1="330" x2="415" y2="310"/>
  </g>
  <!-- Connections layer 3-out -->
  <g stroke="#22c55e" stroke-width="1.2" opacity="0.5">
    <line x1="445" y1="150" x2="550" y2="180"/><line x1="445" y1="150" x2="550" y2="280"/>
    <line x1="445" y1="230" x2="550" y2="180"/><line x1="445" y1="230" x2="550" y2="280"/>
    <line x1="445" y1="310" x2="550" y2="180"/><line x1="445" y1="310" x2="550" y2="280"/>
  </g>
  <!-- Book icon -->
  <rect x="650" y="130" width="100" height="130" rx="8" fill="rgba(34,197,94,0.1)" stroke="rgba(34,197,94,0.3)" stroke-width="1.5"/>
  <line x1="700" y1="130" x2="700" y2="260" stroke="#22c55e" stroke-width="1.5" opacity="0.6"/>
  <line x1="660" y1="160" x2="695" y2="160" stroke="#4ade80" stroke-width="1.5" opacity="0.6"/>
  <line x1="660" y1="180" x2="695" y2="180" stroke="#4ade80" stroke-width="1.5" opacity="0.6"/>
  <line x1="660" y1="200" x2="695" y2="200" stroke="#4ade80" stroke-width="1.5" opacity="0.6"/>
  <line x1="705" y1="160" x2="740" y2="160" stroke="#4ade80" stroke-width="1.5" opacity="0.6"/>
  <line x1="705" y1="180" x2="740" y2="180" stroke="#4ade80" stroke-width="1.5" opacity="0.6"/>
  <line x1="705" y1="200" x2="740" y2="200" stroke="#4ade80" stroke-width="1.5" opacity="0.6"/>
  <text x="400" y="430" font-family="Arial,sans-serif" font-size="22" font-weight="700" fill="#fff" text-anchor="middle" opacity="0.9">AI Education Platform</text>
  <text x="400" y="458" font-family="Arial,sans-serif" font-size="13" fill="#4ade80" text-anchor="middle" opacity="0.7">Adaptive Learning &amp; Intelligent Tutoring</text>
  <rect x="30" y="24" width="120" height="28" rx="14" fill="rgba(34,197,94,0.2)" stroke="rgba(34,197,94,0.4)" stroke-width="1"/>
  <text x="90" y="42" font-family="Arial,sans-serif" font-size="11" fill="#4ade80" text-anchor="middle" font-weight="600">EDUCATION AI</text>
</svg>
