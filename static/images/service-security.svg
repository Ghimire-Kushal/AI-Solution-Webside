<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a1628"/>
      <stop offset="100%" style="stop-color:#1a0a0a"/>
    </linearGradient>
    <linearGradient id="red" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ef4444"/>
      <stop offset="100%" style="stop-color:#f87171"/>
    </linearGradient>
    <linearGradient id="blue" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2E86DE"/>
      <stop offset="100%" style="stop-color:#89C2FF"/>
    </linearGradient>
    <filter id="glow"><feGaussianBlur stdDeviation="5" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>
  <rect width="800" height="500" fill="url(#bg)"/>
  <g opacity="0.07" stroke="#ef4444" stroke-width="1">
    <line x1="0" y1="62" x2="800" y2="62"/><line x1="0" y1="125" x2="800" y2="125"/>
    <line x1="0" y1="187" x2="800" y2="187"/><line x1="0" y1="250" x2="800" y2="250"/>
    <line x1="0" y1="312" x2="800" y2="312"/><line x1="0" y1="375" x2="800" y2="375"/>
    <line x1="100" y1="0" x2="100" y2="500"/><line x1="200" y1="0" x2="200" y2="500"/>
    <line x1="300" y1="0" x2="300" y2="500"/><line x1="400" y1="0" x2="400" y2="500"/>
    <line x1="500" y1="0" x2="500" y2="500"/><line x1="600" y1="0" x2="600" y2="500"/>
    <line x1="700" y1="0" x2="700" y2="500"/>
  </g>
  <!-- Scanning rings -->
  <circle cx="400" cy="230" r="160" fill="none" stroke="rgba(239,68,68,0.15)" stroke-width="1"/>
  <circle cx="400" cy="230" r="120" fill="none" stroke="rgba(239,68,68,0.2)" stroke-width="1"/>
  <circle cx="400" cy="230" r="80" fill="none" stroke="rgba(239,68,68,0.3)" stroke-width="1"/>
  <circle cx="400" cy="230" r="40" fill="rgba(239,68,68,0.1)" stroke="#ef4444" stroke-width="1.5"/>
  <!-- Scan line -->
  <line x1="240" y1="230" x2="560" y2="230" stroke="#ef4444" stroke-width="1" opacity="0.4" stroke-dasharray="4,4"/>
  <line x1="400" y1="70" x2="400" y2="390" stroke="#ef4444" stroke-width="1" opacity="0.4" stroke-dasharray="4,4"/>
  <!-- Camera icon (center) -->
  <circle cx="400" cy="230" r="24" fill="rgba(239,68,68,0.2)" stroke="#ef4444" stroke-width="2" filter="url(#glow)"/>
  <circle cx="400" cy="230" r="10" fill="#ef4444" opacity="0.7"/>
  <!-- Face detection boxes -->
  <rect x="160" y="130" width="80" height="90" rx="4" fill="none" stroke="#2E86DE" stroke-width="1.5" stroke-dasharray="8,4" opacity="0.8"/>
  <line x1="160" y1="130" x2="175" y2="130" stroke="#89C2FF" stroke-width="2.5"/>
  <line x1="160" y1="130" x2="160" y2="145" stroke="#89C2FF" stroke-width="2.5"/>
  <line x1="240" y1="130" x2="225" y2="130" stroke="#89C2FF" stroke-width="2.5"/>
  <line x1="240" y1="130" x2="240" y2="145" stroke="#89C2FF" stroke-width="2.5"/>
  <line x1="160" y1="220" x2="175" y2="220" stroke="#89C2FF" stroke-width="2.5"/>
  <line x1="160" y1="220" x2="160" y2="205" stroke="#89C2FF" stroke-width="2.5"/>
  <line x1="240" y1="220" x2="225" y2="220" stroke="#89C2FF" stroke-width="2.5"/>
  <line x1="240" y1="220" x2="240" y2="205" stroke="#89C2FF" stroke-width="2.5"/>
  <!-- Person silhouette in box -->
  <circle cx="200" cy="155" r="12" fill="rgba(46,134,222,0.3)" stroke="#2E86DE" stroke-width="1"/>
  <path d="M178,195 Q200,175 222,195" fill="rgba(46,134,222,0.2)" stroke="#2E86DE" stroke-width="1"/>
  <!-- Second detection box -->
  <rect x="540" y="150" width="80" height="90" rx="4" fill="none" stroke="#ef4444" stroke-width="1.5" stroke-dasharray="8,4" opacity="0.8"/>
  <line x1="540" y1="150" x2="555" y2="150" stroke="#f87171" stroke-width="2.5"/>
  <line x1="540" y1="150" x2="540" y2="165" stroke="#f87171" stroke-width="2.5"/>
  <line x1="620" y1="150" x2="605" y2="150" stroke="#f87171" stroke-width="2.5"/>
  <line x1="620" y1="150" x2="620" y2="165" stroke="#f87171" stroke-width="2.5"/>
  <line x1="540" y1="240" x2="555" y2="240" stroke="#f87171" stroke-width="2.5"/>
  <line x1="540" y1="240" x2="540" y2="225" stroke="#f87171" stroke-width="2.5"/>
  <line x1="620" y1="240" x2="605" y2="240" stroke="#f87171" stroke-width="2.5"/>
  <line x1="620" y1="240" x2="620" y2="225" stroke="#f87171" stroke-width="2.5"/>
  <!-- Alert triangle in second box -->
  <circle cx="580" cy="180" r="12" fill="rgba(239,68,68,0.3)" stroke="#ef4444" stroke-width="1"/>
  <text x="580" y="185" font-family="Arial" font-size="14" fill="#f87171" text-anchor="middle" font-weight="bold">!</text>
  <!-- Connection lines -->
  <line x1="240" y1="175" x2="376" y2="230" stroke="#2E86DE" stroke-width="1" opacity="0.4"/>
  <line x1="540" y1="195" x2="424" y2="230" stroke="#ef4444" stroke-width="1" opacity="0.4"/>
  <!-- Status indicator -->
  <rect x="310" y="355" width="180" height="30" rx="15" fill="rgba(239,68,68,0.1)" stroke="rgba(239,68,68,0.3)" stroke-width="1"/>
  <circle cx="330" cy="370" r="5" fill="#ef4444" filter="url(#glow)"/>
  <text x="360" y="375" font-family="Arial,monospace" font-size="11" fill="#f87171">THREAT DETECTED</text>
  <text x="400" y="435" font-family="Arial,sans-serif" font-size="22" font-weight="700" fill="#fff" text-anchor="middle" opacity="0.9">AI Security &amp; Surveillance</text>
  <text x="400" y="462" font-family="Arial,sans-serif" font-size="13" fill="#f87171" text-anchor="middle" opacity="0.7">Real-time Threat Detection &amp; Face Recognition</text>
  <rect x="30" y="24" width="120" height="28" rx="14" fill="rgba(239,68,68,0.2)" stroke="rgba(239,68,68,0.4)" stroke-width="1"/>
  <text x="90" y="42" font-family="Arial,sans-serif" font-size="11" fill="#f87171" text-anchor="middle" font-weight="600">SECURITY AI</text>
</svg>
