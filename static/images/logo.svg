<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 60" width="200" height="60">
  <defs>
    <linearGradient id="lg1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1B4F72"/>
      <stop offset="100%" stop-color="#2E86DE"/>
    </linearGradient>
    <linearGradient id="lg2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2E86DE"/>
      <stop offset="100%" stop-color="#89C2FF"/>
    </linearGradient>
  </defs>

  <!-- Pixel dissolve dots -->
  <rect x="2"  y="8"  width="4" height="4" rx="1" fill="#89C2FF" opacity="0.9"/>
  <rect x="8"  y="4"  width="4" height="4" rx="1" fill="#2E86DE" opacity="0.8"/>
  <rect x="2"  y="16" width="3" height="3" rx="1" fill="#2E86DE" opacity="0.6"/>
  <rect x="8"  y="14" width="3" height="3" rx="1" fill="#89C2FF" opacity="0.5"/>
  <rect x="6"  y="22" width="2" height="2" rx="0.5" fill="#2E86DE" opacity="0.4"/>
  <rect x="12" y="20" width="2" height="2" rx="0.5" fill="#89C2FF" opacity="0.3"/>
  <rect x="14" y="10" width="3" height="3" rx="1" fill="#2E86DE" opacity="0.5"/>

  <!-- Letter A -->
  <path d="M20 40 L30 8 L40 40" stroke="url(#lg1)" stroke-width="5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <line x1="24" y1="28" x2="36" y2="28" stroke="url(#lg1)" stroke-width="4" stroke-linecap="round"/>

  <!-- Small person figure inside A -->
  <circle cx="30" cy="18" r="2.5" fill="url(#lg2)"/>
  <path d="M27 26 Q30 22 33 26" stroke="url(#lg2)" stroke-width="1.5" fill="none" stroke-linecap="round"/>

  <!-- Letter i -->
  <circle cx="47" cy="11" r="2.5" fill="url(#lg2)"/>
  <line x1="47" y1="17" x2="47" y2="40" stroke="url(#lg1)" stroke-width="4.5" stroke-linecap="round"/>

  <!-- Text: AI-SOLUTIONS -->
  <text x="58" y="28" font-family="Poppins, Arial, sans-serif" font-size="14" font-weight="700" fill="url(#lg1)">AI-SOLUTIONS</text>

  <!-- Tagline -->
  <text x="58" y="42" font-family="Poppins, Arial, sans-serif" font-size="6" font-weight="400" fill="#89C2FF" letter-spacing="1">INNOVATE · SUPPORT · EMPOWER</text>
</svg>
