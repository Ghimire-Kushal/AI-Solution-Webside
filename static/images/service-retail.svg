<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a1628"/>
      <stop offset="100%" style="stop-color:#130d2a"/>
    </linearGradient>
    <linearGradient id="purple" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#a855f7"/>
      <stop offset="100%" style="stop-color:#c084fc"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f97316"/>
      <stop offset="100%" style="stop-color:#fb923c"/>
    </linearGradient>
    <filter id="glow"><feGaussianBlur stdDeviation="4" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>
  <rect width="800" height="500" fill="url(#bg)"/>
  <g opacity="0.07" stroke="#a855f7" stroke-width="1">
    <line x1="0" y1="62" x2="800" y2="62"/><line x1="0" y1="125" x2="800" y2="125"/>
    <line x1="0" y1="187" x2="800" y2="187"/><line x1="0" y1="250" x2="800" y2="250"/>
    <line x1="0" y1="312" x2="800" y2="312"/><line x1="0" y1="375" x2="800" y2="375"/>
    <line x1="0" y1="437" x2="800" y2="437"/>
    <line x1="100" y1="0" x2="100" y2="500"/><line x1="200" y1="0" x2="200" y2="500"/>
    <line x1="300" y1="0" x2="300" y2="500"/><line x1="400" y1="0" x2="400" y2="500"/>
    <line x1="500" y1="0" x2="500" y2="500"/><line x1="600" y1="0" x2="600" y2="500"/>
    <line x1="700" y1="0" x2="700" y2="500"/>
  </g>
  <circle cx="400" cy="250" r="160" fill="rgba(168,85,247,0.06)"/>
  <!-- Bar chart -->
  <rect x="120" y="320" width="50" height="80" rx="4" fill="url(#purple)" opacity="0.7"/>
  <rect x="185" y="280" width="50" height="120" rx="4" fill="url(#purple)" opacity="0.8"/>
  <rect x="250" y="240" width="50" height="160" rx="4" fill="url(#purple)" opacity="0.9"/>
  <rect x="315" y="200" width="50" height="200" rx="4" fill="url(#accent)" opacity="0.9"/>
  <rect x="380" y="220" width="50" height="180" rx="4" fill="url(#purple)" opacity="0.85"/>
  <rect x="445" y="260" width="50" height="140" rx="4" fill="url(#purple)" opacity="0.8"/>
  <rect x="510" y="240" width="50" height="160" rx="4" fill="url(#accent)" opacity="0.85"/>
  <rect x="575" y="290" width="50" height="110" rx="4" fill="url(#purple)" opacity="0.75"/>
  <!-- Trend line -->
  <polyline points="145,320 210,280 275,240 340,200 405,220 470,260 535,240 600,290"
    fill="none" stroke="#f97316" stroke-width="2.5" stroke-dasharray="6,3" filter="url(#glow)" opacity="0.8"/>
  <!-- Cart icon -->
  <circle cx="630" cy="160" r="40" fill="rgba(168,85,247,0.15)" stroke="rgba(168,85,247,0.4)" stroke-width="1.5"/>
  <path d="M612,148 l4,0 l8,24 l18,0 l6,-16 l-26,0" fill="none" stroke="#c084fc" stroke-width="2.5" stroke-linejoin="round"/>
  <circle cx="626" cy="175" r="3" fill="#c084fc"/>
  <circle cx="640" cy="175" r="3" fill="#c084fc"/>
  <!-- AI nodes -->
  <circle cx="100" cy="100" r="7" fill="#a855f7" filter="url(#glow)"/>
  <circle cx="200" cy="70" r="5" fill="#c084fc" filter="url(#glow)"/>
  <circle cx="700" cy="80" r="7" fill="#f97316" filter="url(#glow)"/>
  <circle cx="730" cy="380" r="5" fill="#a855f7" filter="url(#glow)"/>
  <line x1="100" y1="100" x2="200" y2="70" stroke="#a855f7" stroke-width="1" opacity="0.4"/>
  <line x1="200" y1="70" x2="700" y2="80" stroke="#a855f7" stroke-width="1" opacity="0.3"/>
  <text x="400" y="430" font-family="Arial,sans-serif" font-size="22" font-weight="700" fill="#fff" text-anchor="middle" opacity="0.9">AI Retail &amp; Commerce</text>
  <text x="400" y="458" font-family="Arial,sans-serif" font-size="13" fill="#c084fc" text-anchor="middle" opacity="0.7">Smart Inventory &amp; Recommendation Engine</text>
  <rect x="30" y="24" width="110" height="28" rx="14" fill="rgba(168,85,247,0.2)" stroke="rgba(168,85,247,0.4)" stroke-width="1"/>
  <text x="85" y="42" font-family="Arial,sans-serif" font-size="11" fill="#c084fc" text-anchor="middle" font-weight="600">RETAIL AI</text>
</svg>
